<!DOCTYPE html>
<html lang="en">
<head>
  <script>(function(){var t=localStorage.getItem('tob-theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);}());</script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Profile — Blogton</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=EB+Garamond:ital,wght@0,400..800;1,400..800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles/main.css">
  <link rel="stylesheet" href="/app/profile/profile.css">
  <link rel="icon" type="image/x-icon" href="/assets/favicon.ico">
  <link rel="icon" type="image/png"     href="/assets/favicon.png">
</head>

<body class="page-profile">

<div class="toast-container" id="toast-container"></div>

  <main class="app-page" id="profile-page">
    <div id="profile-content">
      <!-- Populated by JS -->
    </div>
  </main>

  <!-- Delete confirmation modal -->
  <div class="modal-backdrop hidden" id="delete-modal">
    <div class="confirm-modal">
      <h3>Delete Post?</h3>
      <p>This action cannot be undone. The post will be permanently removed.</p>
      <div class="confirm-modal-actions">
        <button class="btn btn-ghost" id="delete-cancel-btn">Cancel</button>
        <button class="btn-danger" id="delete-confirm-btn">Delete</button>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="/scripts/supabaseClient.js"></script>
  <script src="/scripts/transitions.js"></script>
  <script src="/scripts/utils.js"></script>
  <script src="/scripts/auth.js"></script>
  <script src="/scripts/userProfile.js"></script>
  <script src="/scripts/modules/interactions.js"></script>
  <script src="/scripts/modules/blogCard.js"></script>
  <script src="/scripts/modules/profileStore.js"></script>
  <script src="/scripts/modules/composeModal.js"></script>
  <script src="/scripts/modules/navSearch.js"></script>
  <script src="/scripts/components/nav.js"></script>
  <script src="/app/profile/profile.js"></script>
</body>
</html>
